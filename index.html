<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TsunamiLab</title>
    <style>
      html,
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
        background: #000;
      }
      #app {
        display: block;
        width: 100vw;
        height: 100vh;
      }
      #status {
        position: fixed;
        top: 16px;
        left: 16px;
        color: #fff;
        font-family: system-ui, sans-serif;
        font-size: 14px;
        background: rgba(0, 0, 0, 0.5);
        padding: 8px 12px;
        border-radius: 6px;
        pointer-events: none;
        max-width: 300px;
      }
    </style>
  </head>
  <body>
    <canvas id="app"></canvas>
    <div id="status"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
